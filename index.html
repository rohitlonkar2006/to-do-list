<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>To-Do List</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <main class="app">
        <h1 class="title">To-Do List Rohit</h1>

        <form class="todo-form" id="todo-form" aria-label="Add todo">
            <input id="new-todo" class="todo-input" type="text" placeholder="Add a new task…" aria-label="New todo" />
            <button type="submit" class="add-btn">Add</button>
            <button type="button" class="clear-btn" id="clear-completed">Clear completed</button>
        </form>

        <ul class="todo-list" id="todo-list">
            <li>
                <input id="t1" type="checkbox" checked>
                <label for="t1">Write project proposal</label>
            </li>
            <li>
                <input id="t2" type="checkbox">
                <label for="t2">Study for statistics exam</label>
            </li>
            <li>
                <input id="t3" type="checkbox">
                <label for="t3">Finish coding assignment</label>
            </li>
            <li>
                <input id="t4" type="checkbox">
                <label for="t4">Grocery shopping</label>
            </li>
            <li>
                <input id="t5" type="checkbox">
                <label for="t5">Clean workspace</label>
            </li>
            <li>
                <input id="t6" type="checkbox">
                <label for="t6">Reply to important emails</label>
            </li>
            <li>
                <input id="t7" type="checkbox">
                <label for="t7">Schedule weekly planning</label>
            </li>
            <li>
                <input id="t8" type="checkbox">
                <label for="t8">30-minute exercise</label>
            </li>
        </ul>

        <p class="hint">Tip: toggle the checkboxes to mark items complete. Use the input above to add tasks.</p>
        <script src="script.js"></script>
    </main>
</body>

</html>
